services:
  db:
    image: postgres:16-alpine
    container_name: el-pie-castillo-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: elpiecastillo
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d elpiecastillo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
